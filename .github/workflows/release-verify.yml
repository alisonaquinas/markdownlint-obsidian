name: Release verify

on:
  release:
    types: [published]

jobs:
  verify-npm:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for publish workflows to complete and CDN to propagate
        # npm-publish and docker-publish take 3-10 min; add buffer for CDN propagation
        run: sleep 600

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install cli from npmjs.org and verify version
        if: startsWith(github.event.release.tag_name, 'packages/cli')
        run: |
          VERSION="${GITHUB_REF_NAME#packages/cli}"
          VERSION="${VERSION#v}"
          npm install -g "markdownlint-obsidian-cli@${VERSION}"
          OUT=$(markdownlint-obsidian --version)
          echo "$OUT"
          echo "$OUT" | grep -q "${VERSION}"

      - name: Audit npm signatures (verifies provenance)
        if: startsWith(github.event.release.tag_name, 'packages/cli')
        run: |
          VERSION="${GITHUB_REF_NAME#packages/cli}"
          VERSION="${VERSION#v}"
          mkdir /tmp/audit-test && cd /tmp/audit-test
          npm init -y
          npm install "markdownlint-obsidian-cli@${VERSION}"
          npm audit signatures

  verify-ghcr-npm:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for publish workflows to complete and CDN to propagate
        # npm-publish and docker-publish take 3-10 min; add buffer for CDN propagation
        run: sleep 600

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://npm.pkg.github.com"
          scope: "@alisonaquinas"

      - name: Install cli from GitHub Packages and verify
        if: startsWith(github.event.release.tag_name, 'packages/cli')
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#packages/cli}"
          VERSION="${VERSION#v}"
          npm install -g "@alisonaquinas/markdownlint-obsidian-cli@${VERSION}"
          markdownlint-obsidian --version

  verify-ghcr-docker:
    runs-on: ubuntu-latest
    if: startsWith(github.event.release.tag_name, 'packages/cli')
    steps:
      - name: Wait for Docker image propagation
        run: sleep 120

      - uses: sigstore/cosign-installer@v3

      - name: Pull, verify signature, and smoke-test image
        run: |
          DOCKER_TAG=$(echo "${{ github.event.release.tag_name }}" | sed 's|packages/[^v]*||')
          IMG="ghcr.io/alisonaquinas/markdownlint-obsidian:${DOCKER_TAG}"
          docker pull "$IMG"
          cosign verify \
            --certificate-identity-regexp '^https://github\.com/alisonaquinas/markdownlint-obsidian/' \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            "$IMG"
          docker run --rm "$IMG" --version
