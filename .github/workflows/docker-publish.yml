name: docker-publish

on:
  release:
    types: [published]

jobs:
  build:
    if: startsWith(github.event.release.tag_name, 'packages/cli')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4

      - name: Derive Docker tag from release tag
        id: tag
        run: |
          DOCKER_TAG=$(echo "${{ github.event.release.tag_name }}" | sed 's|packages/[^v]*||')
          echo "docker_tag=${DOCKER_TAG}" >> "$GITHUB_OUTPUT"

      - uses: sigstore/cosign-installer@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ghcr.io/alisonaquinas/markdownlint-obsidian:latest
            ghcr.io/alisonaquinas/markdownlint-obsidian:${{ steps.tag.outputs.docker_tag }}
          sbom: true
          provenance: mode=max

      - name: Sign image with cosign (keyless, OIDC)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign sign --yes \
            "ghcr.io/alisonaquinas/markdownlint-obsidian@${DIGEST}"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ghcr.io/alisonaquinas/markdownlint-obsidian
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
