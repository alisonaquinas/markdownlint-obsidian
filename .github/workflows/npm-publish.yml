name: Publish to npm

# Thin caller — all publish logic lives in _publish-packages.yml so the same
# pipeline can be dry-run in CI (ci.yml) and executed here on real releases.

on:
  release:
    types: [published]

jobs:
  publish:
    uses: ./.github/workflows/_publish-packages.yml
    permissions:
      id-token: write # propagated to the reusable workflow's publish job for --provenance
      contents: read
      packages: write # propagated to the reusable workflow's publish-ghcr-npm job
    with:
      dry_run: false
      tag_name: ${{ github.event.release.tag_name }}
