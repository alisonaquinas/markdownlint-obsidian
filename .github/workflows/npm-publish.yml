name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"

      - run: bun install --frozen-lockfile

      - name: Build core
        run: bun run --filter markdownlint-obsidian build

      - name: Build cli
        run: bun run --filter markdownlint-obsidian-cli build

      - name: Publish core (if core release tag)
        if: startsWith(github.event.release.tag_name, 'packages/core')
        run: npm publish --access public --provenance
        working-directory: packages/core
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish cli (if cli release tag)
        if: startsWith(github.event.release.tag_name, 'packages/cli')
        run: npm publish --access public --provenance
        working-directory: packages/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-ghcr-npm:
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        pkg:
          - { dir: packages/core, tag_prefix: "packages/core" }
          - { dir: packages/cli,  tag_prefix: "packages/cli" }
    steps:
      - uses: actions/checkout@v4
        if: startsWith(github.event.release.tag_name, matrix.pkg.tag_prefix)

      - uses: oven-sh/setup-bun@v2
        if: startsWith(github.event.release.tag_name, matrix.pkg.tag_prefix)
        with:
          bun-version: "1.3.12"

      - uses: actions/setup-node@v4
        if: startsWith(github.event.release.tag_name, matrix.pkg.tag_prefix)
        with:
          node-version: "20"
          registry-url: "https://npm.pkg.github.com"
          scope: "@alisonaquinas"

      - name: Build
        if: startsWith(github.event.release.tag_name, matrix.pkg.tag_prefix)
        run: bun install --frozen-lockfile && bun run --filter '*' build

      - name: Rewrite name to scoped form and publish
        if: startsWith(github.event.release.tag_name, matrix.pkg.tag_prefix)
        working-directory: ${{ matrix.pkg.dir }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json','utf8'));
            pkg.name = '@alisonaquinas/' + pkg.name;
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          npm publish --access public
