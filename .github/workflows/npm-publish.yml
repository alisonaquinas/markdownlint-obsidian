name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"

      - run: bun install --frozen-lockfile

      - name: Build core
        run: bun run --filter markdownlint-obsidian build

      - name: Build cli
        run: bun run --filter markdownlint-obsidian-cli build

      - name: Publish core (if core release tag)
        if: startsWith(github.event.release.tag_name, 'packages/core')
        run: npm publish --access public
        working-directory: packages/core
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish cli (if cli release tag)
        if: startsWith(github.event.release.tag_name, 'packages/cli')
        run: npm publish --access public
        working-directory: packages/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
