name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"

      - run: bun install --frozen-lockfile

      # Build core first so its dist/ type declarations are available for
      # the CLI typecheck (CLI imports from markdownlint-obsidian/engine).
      - name: Build core (generates dist/ for downstream typechecks)
        run: bun run --filter markdownlint-obsidian build

      - name: Type check (all packages)
        run: bun run --filter '*' typecheck

      - name: Lint
        run: bun run lint

      - name: Unit + integration tests (all packages)
        run: bun run --filter '*' test

      - name: BDD acceptance tests
        run: bun run test:bdd

      - name: Dogfood docs/
        run: bun run test:dogfood

      - name: Build (all packages)
        run: bun run --filter '*' build

      - name: Verify action bundle builds without errors
        # esbuild module-ordering is platform-specific (Linux vs macOS/Windows),
        # so a bit-for-bit git diff would always fail on cross-platform teams.
        # We verify the bundle compiles cleanly; source correctness is covered
        # by the typecheck step above.
        run: |
          cd action
          bun install
          bun run build

  dogfood-published:
    # Lint docs/ using the published markdownlint-obsidian-cli package on
    # npmjs.org (not the local source). This catches release regressions that
    # only manifest in the packaged artifact (missing files, broken bin entry,
    # bad workspace dep resolution, etc.) and also verifies that consumers can
    # install and run the CLI from a clean environment.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Lint docs/ with published markdownlint-obsidian-cli
        working-directory: docs
        run: npx -y markdownlint-obsidian-cli@latest "**/*.md"

  publish-dry-run:
    # Dry-run the full publish pipeline (build → prepare-publish.mjs → npm
    # publish --dry-run) for both packages on every PR and push.  Exercises
    # the same code path as a real release without touching any registry, so
    # packaging failures surface before merge rather than at release time.
    needs: build-and-test
    uses: ./.github/workflows/_publish-packages.yml
    permissions:
      contents: read
    with:
      dry_run: true
      tag_name: ""
