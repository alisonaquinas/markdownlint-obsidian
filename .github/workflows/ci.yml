name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit + integration tests
        run: npm run test

      - name: BDD acceptance tests
        run: npm run test:bdd

      - name: Dogfood docs/
        run: npm run test:dogfood

      - name: Verify action bundle is up-to-date
        run: |
          cd action
          npm install
          npm run build
          cd ..
          git diff --exit-code action/dist/ || {
            echo "action/dist/ is stale — run 'cd action && npm install && npm run build' and commit"
            exit 1
          }
